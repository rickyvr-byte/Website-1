<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RickyStuff</title>

<style>
    body {
        margin: 0;
        font-family: "Courier New", monospace;
        background: #2b2b2b;
    }

    /* TOP BAR FIXED */
    .top {
        background: #8b2e00;
        height: 220px;
        position: fixed; /* <-- stay at top */
        top: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        z-index: 1000; /* above content */
    }

    .left-text {
        display: none;
    }

    /* CONE LEFT */
    .cone {
        position: absolute;
        left: 40px;
        top: 50%;
        transform: translateY(-50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
        cursor: pointer;
    }

    /* LOGO CENTER */
    .logo {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
    }

    /* Wave container */
    .wave-container {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100px;
        overflow: hidden;
    }

    svg {
        width: 200%;
        height: 100%;
        animation: waveMove 6s linear infinite;
    }

    @keyframes waveMove {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
    }

    /* content spacing so it's not hidden behind top */
    .content {
        margin-top: 220px; /* same as top height */
        height: 2000px; /* just for demo scrolling */
        background: #2b2b2b;
    }
</style>
</head>
<body>

<div class="top">

    <!-- CONE LEFT -->
    <img src="ConeTransp.png" class="cone">

    <!-- LOGO CENTER -->
    <img src="RickyStuffLogo.png" class="logo">

    <div class="wave-container">
        <svg viewBox="0 0 2400 120" preserveAspectRatio="none">

            <path d="M0,30 
                     C150,70 350,-30 600,30 
                     C850,90 1050,-10 1200,30
                     C1350,70 1550,-30 1800,30
                     C2050,90 2250,-10 2400,30
                     L2400,120 L0,120 Z"
                  fill="#c94a00"></path>

            <path d="M0,60 
                     C150,100 350,0 600,60 
                     C850,120 1050,20 1200,60
                     C1350,100 1550,0 1800,60
                     C2050,120 2250,20 2400,60
                     L2400,120 L0,120 Z"
                  fill="#2b2b2b"></path>

        </svg>
    </div>

</div>

<div class="content"></div>

<script>
    const cone = document.querySelector(".cone");

    cone.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "instant" });

        const flash = document.createElement("div");
        flash.style.position = "fixed";
        flash.style.top = 0;
        flash.style.left = 0;
        flash.style.width = "100%";
        flash.style.height = "100%";
        flash.style.background = "white";
        flash.style.opacity = "1";
        flash.style.pointerEvents = "none";
        flash.style.transition = "opacity 0.4s ease";
        flash.style.zIndex = "9999"; // <-- ensures it covers the fixed top

        document.body.appendChild(flash);

        setTimeout(() => flash.style.opacity = "0", 10);
        setTimeout(() => flash.remove(), 400);
    });
</script>

</body>
</html>
