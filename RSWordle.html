<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RS Wordle</title>
<link rel="icon" type="image/png" href="ConeTransp.png">

<style>
    @font-face {
        font-family: 'LemonMilk';
        src: url('LEMONMILK-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; }

    :root {
        --bg: #2b2b2b;
        --header: #8b2e00;
        --wave1: #c94a00;
        --correct: #2d6a2d;
        --misplace: #c94a00;
        --wrong: #3f3f3f;
        --tile-empty: #353535;
        --tile-border: #555;
        --text: #ffffff;
        --key-bg: #4a4a4a;
    }

    body {
        margin: 0;
        font-family: 'LemonMilk', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .top {
        background: var(--header);
        height: 200px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        z-index: 1000;
    }

    .cone {
        position: absolute;
        left: 40px;
        top: 50%;
        transform: translateY(-50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
        cursor: pointer;
        transition: transform 0.15s ease;
    }
    .cone:hover { transform: translateY(-50%) translateY(-30px) scale(1.08); }
    .cone:active { transform: translateY(-50%) translateY(-30px) scale(0.96); }

    .logo {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) translateY(-30px);
        height: 72px;
        object-fit: contain;
    }

    .wave-container {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100px;
        overflow: hidden;
    }

    .wave-container svg {
        width: 200%;
        height: 100%;
        animation: waveMove 6s linear infinite;
    }

    @keyframes waveMove {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
    }

    /* ── FLASH ── */
    #flash {
        position: fixed;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 9999;
        transition: opacity 0.4s ease;
    }

    /* ── CONTENT ── */
    .content {
        margin-top: 200px;
        padding: 30px 16px 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    /* ── TOAST ── */
    #toast {
        position: fixed;
        top: 220px;
        left: 50%;
        transform: translateX(-50%);
        background: #111;
        color: white;
        padding: 10px 22px;
        border-radius: 8px;
        font-size: 13px;
        letter-spacing: 1px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 2000;
    }
    #toast.show { opacity: 1; }

    /* ── GRID ── */
    #grid {
        display: grid;
        grid-template-rows: repeat(6, 1fr);
        gap: 6px;
    }

    .row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
    }

    .tile {
        width: 62px;
        height: 62px;
        border: 2px solid var(--tile-border);
        border-radius: 6px;
        background: var(--tile-empty);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: background 0.25s ease, border-color 0.25s ease, transform 0.1s ease;
        position: relative;
        overflow: hidden;
    }

    /* pop on letter entry */
    .tile.pop {
        animation: pop 0.1s ease;
    }
    @keyframes pop {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.12); }
        100% { transform: scale(1); }
    }

    /* flip reveal */
    .tile.flip {
        animation: flip 0.5s ease forwards;
    }
    @keyframes flip {
        0%   { transform: rotateX(0deg); }
        50%  { transform: rotateX(90deg); }
        100% { transform: rotateX(0deg); }
    }

    /* shake on bad word */
    .row.shake {
        animation: shake 0.4s ease;
    }
    @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%      { transform: translateX(-6px); }
        40%      { transform: translateX(6px); }
        60%      { transform: translateX(-4px); }
        80%      { transform: translateX(4px); }
    }

    /* win bounce */
    .tile.bounce {
        animation: bounce 0.5s ease forwards;
    }
    @keyframes bounce {
        0%,100% { transform: translateY(0); }
        40%     { transform: translateY(-14px); }
        70%     { transform: translateY(-6px); }
    }

    .tile.correct  { background: var(--correct);  border-color: var(--correct);  }
    .tile.misplace { background: var(--misplace); border-color: var(--misplace); }
    .tile.wrong    { background: var(--wrong);    border-color: var(--wrong);    }
    .tile.filled   { border-color: #888; }

    /* ── KEYBOARD ── */
    #keyboard {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 100%;
        max-width: 500px;
    }

    .key-row {
        display: flex;
        gap: 6px;
        justify-content: center;
    }

    .key {
        height: 58px;
        min-width: 38px;
        padding: 0 8px;
        border: none;
        border-radius: 6px;
        background: var(--key-bg);
        color: var(--text);
        font-family: 'LemonMilk', sans-serif;
        font-size: 12px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: background 0.2s ease, transform 0.1s ease;
        user-select: none;
    }
    .key:hover  { filter: brightness(1.2); }
    .key:active { transform: scale(0.93); }

    .key.wide   { min-width: 58px; font-size: 10px; }

    .key.correct  { background: var(--correct); }
    .key.misplace { background: var(--misplace); }
    .key.wrong    { background: #333; color: #777; }

    /* ── RESTART HINT ── */
    #restart-hint {
        color: #aaa;
        font-size: 11px;
        letter-spacing: 1px;
        margin-top: -10px;
        opacity: 1;
    }
    #restart-hint.faded { opacity: 0; }
</style>
</head>
<body>

<!-- Flash overlay -->
<div id="flash"></div>
<div id="toast"></div>

<!-- Top bar -->
<div class="top">
    <img src="ConeTransp.png" class="cone" id="cone" title="Restart game">
    <img src="RSWordlelogo.png" class="logo" alt="RS Wordle">

    <div class="wave-container">
        <svg viewBox="0 0 2400 120" preserveAspectRatio="none">
            <path d="M0,30 C150,70 350,-30 600,30 C850,90 1050,-10 1200,30
                     C1350,70 1550,-30 1800,30 C2050,90 2250,-10 2400,30
                     L2400,120 L0,120 Z" fill="#c94a00"></path>
            <path d="M0,60 C150,100 350,0 600,60 C850,120 1050,20 1200,60
                     C1350,100 1550,0 1800,60 C2050,120 2250,20 2400,60
                     L2400,120 L0,120 Z" fill="#2b2b2b"></path>
        </svg>
    </div>
</div>

<!-- Game area -->
<div class="content">
    <div id="grid"></div>
    <div id="restart-hint">Click the cone to get a new word!</div>
    <div id="keyboard"></div>
</div>

<script>

  "those","three","threw","throw","thumb","tiger","timer","title","toast","today",

  "train","tramp","treat","trend","trial","troop","trout","truck","truly","truth",
  "tumor","ultra","uncle","under","unify","union","unite","until","upper","upset",
  "usage","usual","utter","valid","value","valve","video","vigor","viral","virus",
  "visit","vista","vital","vivid","vocal","voice","voila","vomit","voter","voxel",
  "waist","waste","watch","water","weary","wedge","weird","where","which","while",

].filter(w => w.length === 5);

// ─── STATE ─────────────────────────────────────────────────────────────────
let answer, currentRow, currentCol, board, gameOver;

function initGame() {
    answer   = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
    currentRow = 0;
    currentCol = 0;
    gameOver   = false;
    board      = Array.from({length: 6}, () => Array(5).fill(''));
    buildGrid();
    buildKeyboard();
}

// ─── GRID ───────────────────────────────────────────────────────────────────
function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let r = 0; r < 6; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.id = `row-${r}`;
        for (let c = 0; c < 5; c++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${r}-${c}`;
            row.appendChild(tile);
        }
        grid.appendChild(row);
    }
}

function getTile(r, c) {
    return document.getElementById(`tile-${r}-${c}`);
}

// ─── KEYBOARD ───────────────────────────────────────────────────────────────
const ROWS_KEYS = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
];

function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    ROWS_KEYS.forEach(row => {
        const kr = document.createElement('div');
        kr.className = 'key-row';
        row.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'key' + (k.length > 1 ? ' wide' : '');
            btn.textContent = k;
            btn.id = `key-${k}`;
            btn.addEventListener('click', () => handleKey(k));
            kr.appendChild(btn);
        });
        kb.appendChild(kr);
    });
}

function colorKey(letter, state) {
    const key = document.getElementById(`key-${letter}`);
    if (!key) return;
    const priority = { correct: 3, misplace: 2, wrong: 1 };
    const cur = key.dataset.state || '';
    if ((priority[state] || 0) > (priority[cur] || 0)) {
        key.dataset.state = state;
        key.classList.remove('correct','misplace','wrong');
        key.classList.add(state);
    }
}

// ─── INPUT ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    if (e.key === 'Enter')     handleKey('ENTER');
    else if (e.key === 'Backspace') handleKey('⌫');
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(k) {
    if (gameOver) return;
    if (k === '⌫') deleteLetter();
    else if (k === 'ENTER') submitRow();
    else if (/^[A-Z]$/.test(k)) addLetter(k);
}

function addLetter(letter) {
    if (currentCol >= 5) return;
    board[currentRow][currentCol] = letter;
    const tile = getTile(currentRow, currentCol);
    tile.textContent = letter;
    tile.classList.add('filled');
    tile.classList.remove('pop');
    void tile.offsetWidth;
    tile.classList.add('pop');
    currentCol++;
}

function deleteLetter() {
    if (currentCol <= 0) return;
    currentCol--;
    board[currentRow][currentCol] = '';
    const tile = getTile(currentRow, currentCol);
    tile.textContent = '';
    tile.classList.remove('filled');
}

// ─── EVALUATION ─────────────────────────────────────────────────────────────
function submitRow() {
    if (currentCol < 5) { showToast('not enough letters'); shakeRow(); return; }

    const guess = board[currentRow].join('');

    // allow any 5-letter input — no word list check

    const result = evaluate(guess, answer);
    revealRow(currentRow, result, () => {
        result.forEach(({letter, state}) => colorKey(letter, state));

        if (result.every(r => r.state === 'correct')) {
            setTimeout(() => {
                bounceRow(currentRow);
                showToast(['genius!','brilliant!','great!','nice!','phew!','lucky..'][currentRow]);
            }, 200);
            gameOver = true;
        } else if (currentRow === 5) {
            setTimeout(() => showToast(answer, 3000), 200);
            gameOver = true;
        }
        currentRow++;
        currentCol = 0;
    });
}

function evaluate(guess, answer) {
    const result = Array(5).fill(null).map((_,i) => ({
        letter: guess[i], state: 'wrong'
    }));
    const ansArr = answer.split('');
    const used   = Array(5).fill(false);

    // correct pass
    for (let i = 0; i < 5; i++) {
        if (guess[i] === answer[i]) {
            result[i].state = 'correct';
            used[i] = true;
        }
    }
    // misplace pass
    for (let i = 0; i < 5; i++) {
        if (result[i].state === 'correct') continue;
        for (let j = 0; j < 5; j++) {
            if (!used[j] && guess[i] === answer[j]) {
                result[i].state = 'misplace';
                used[j] = true;
                break;
            }
        }
    }
    return result;
}

// ─── ANIMATIONS ─────────────────────────────────────────────────────────────
function revealRow(row, result, cb) {
    result.forEach(({state}, i) => {
        const tile = getTile(row, i);
        setTimeout(() => {
            tile.classList.add('flip');
            setTimeout(() => {
                tile.classList.remove('filled');
                tile.classList.add(state);
            }, 250);
        }, i * 120);
    });
    setTimeout(cb, result.length * 120 + 400);
}

function bounceRow(row) {
    for (let c = 0; c < 5; c++) {
        const tile = getTile(row, c);
        setTimeout(() => {
            tile.classList.add('bounce');
        }, c * 80);
    }
}

function shakeRow() {
    const row = document.getElementById(`row-${currentRow}`);
    row.classList.remove('shake');
    void row.offsetWidth;
    row.classList.add('shake');
}

// ─── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, dur = 1800) {
    const t = document.getElementById('toast');
    clearTimeout(toastTimer);
    t.textContent = msg;
    t.classList.add('show');
    toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}

// ─── CONE / RESTART ─────────────────────────────────────────────────────────
document.getElementById('cone').addEventListener('click', () => {
    const flash = document.getElementById('flash');
    flash.style.opacity = '1';
    flash.style.transition = 'none';
    setTimeout(() => {
        flash.style.transition = 'opacity 0.4s ease';
        flash.style.opacity = '0';
    }, 10);
    setTimeout(() => { initGame(); startHintFade(); }, 80);
});

// ─── HINT FADE ───────────────────────────────────────────────────────────────
function startHintFade() {
    const hint = document.getElementById('restart-hint');
    clearTimeout(hint._fadeTimer);
    // reset instantly with no transition
    hint.style.transition = 'none';
    hint.style.opacity    = '1';
    // after a frame, kick off the 3s delay then 3s fade
    requestAnimationFrame(() => {
        hint._fadeTimer = setTimeout(() => {
            hint.style.transition = 'opacity 3s ease';
            hint.style.opacity    = '0';
        }, 3000);
    });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
initGame();
startHintFade();
</script>
</body>
