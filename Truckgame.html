<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Truck Chaos</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>
<body>
<script>
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 900 }, debug: false }
  },
  scene: { preload, create, update }
};

let player, shadow, trucks, walls, cursors;
const game = new Phaser.Game(config);

function preload() {
  this.load.image('truck', 'Trucklow.png');
  this.load.image('player', 'PlayerTruckGame.png');
}

function create() {
  cursors = this.input.keyboard.createCursorKeys();

  // SHADOW
  shadow = this.add.ellipse(200, 0, 60, 15, 0x000000, 0.5);
  shadow.setDepth(-1);

  // PLAYER
  player = this.physics.add.sprite(200, 200, 'player');
  player.setScale(0.15);
  player.setCollideWorldBounds(false);
  player.body.setSize(player.width * 0.6, player.height * 0.8);

  trucks = this.physics.add.group();
  walls = this.physics.add.staticGroup();

  this.physics.add.collider(player, trucks);
  this.physics.add.collider(trucks, walls);

  this.time.addEvent({ delay: 1200, callback: spawnTruck, callbackScope: this, loop: true });
  this.time.addEvent({ delay: 3000, callback: spawnWall, callbackScope: this, loop: true });
}

function spawnTruck() {
  let height = Phaser.Math.Between(window.innerHeight - 150, window.innerHeight - 50);
  let speed = Phaser.Math.Between(150, 300);
  let scaleX = Phaser.Math.FloatBetween(0.3, 0.8);

  let truck = trucks.create(-200, height, 'truck');
  truck.setScale(scaleX, 0.25);

  truck.body.setVelocityX(speed);
  truck.body.setImmovable(false);
  truck.body.setBounce(0.1);

  truck.body.setSize(truck.width * 0.9, truck.height * 0.5);
  truck.setAngle(Phaser.Math.Between(-5, 5));
}

function spawnWall() {
  let wall = this.add.rectangle(window.innerWidth + 50, window.innerHeight - 120, 40, 240, 0x8888ff);
  this.physics.add.existing(wall, true);
  walls.add(wall);
}

function update() {
  if (!player.body) return;

  // PLAYER MOVEMENT
  if (cursors.left.isDown) {
    player.setVelocityX(-250);
  } else if (cursors.right.isDown) {
    player.setVelocityX(250);
  } else {
    player.setVelocityX(0);
  }

  // JUMP
  if (cursors.space.isDown && player.body.touching.down) {
    player.setVelocityY(-500);
  }

  // PLAYER SCALE AND SHADOW EFFECT
  const groundY = getPlayerGroundY();
  const maxJumpHeight = 200;
  const jumpProgress = Phaser.Math.Clamp((groundY - player.y) / maxJumpHeight, 0, 1);

  // Ease in/out scale (player grows smaller in air, bigger near ground)
  const scale = Phaser.Math.Easing.Sine.InOut(0.15, 0.12, jumpProgress);
  player.setScale(scale);

  // Shadow position and scale
  shadow.x = player.x;
  shadow.y = groundY + 20;
  shadow.scaleX = 1 - jumpProgress * 0.5;
  shadow.scaleY = 1 - jumpProgress * 0.7;

  // DEATH
  if (player.y > window.innerHeight + 100) {
    location.reload();
  }

  // CLEANUP TRUCKS
  trucks.getChildren().forEach(truck => {
    if (truck.x > window.innerWidth + 200) truck.destroy();
  });
}

function getPlayerGroundY() {
  // simple approximation: closest truck below player
  let ground = window.innerHeight;
  trucks.getChildren().forEach(truck => {
    if (player.x + player.width/2 > truck.x - truck.width/2 && player.x - player.width/2 < truck.x + truck.width/2) {
      if (truck.y < ground && player.y <= truck.y) {
        ground = truck.y;
      }
    }
  });
  return ground;
}

window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
