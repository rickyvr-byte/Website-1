<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RickyStuff</title>
<link rel="icon" type="image/png" href="ConeTransp.png">

<style>
    @font-face {
        font-family: 'LemonMilk';
        src: url('LEMONMILK-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
    }

    body {
        margin: 0;
        font-family: 'LemonMilk', sans-serif;
        background: #2b2b2b;
    }

    .top {
        background: #8b2e00;
        height: 220px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        z-index: 1000;
    }

    .cone {
        position: absolute;
        left: 40px;
        top: 50%;
        transform: translateY(-50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
        cursor: pointer;
    }

    .logo {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
    }

    .wave-container {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100px;
        overflow: hidden;
    }

    svg {
        width: 200%;
        height: 100%;
        animation: waveMove 6s linear infinite;
    }

    @keyframes waveMove {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
    }

    .content {
        margin-top: 220px;
        height: 2000px;
        background: #2b2b2b;
        padding-top: 40px;
    }

    .card {
        width: 50%;
        margin: 40px auto;
        background: #3a3a3a;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
        display: block;
    }

    .card:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card-img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        display: block;
    }

    .card-info {
        padding: 15px;
        color: white;
    }

    .card-info h2 {
        margin: 0 0 5px 0;
    }

    .card-info p {
        margin: 0;
        font-size: 14px;
        color: #ccc;
    }
</style>
</head>
<body>

<div class="top">
    <img src="ConeTransp.png" class="cone">
    <img src="RickyStuffLogo.png" class="logo">

    <div class="wave-container">
        <svg viewBox="0 0 2400 120" preserveAspectRatio="none">
            <path d="M0,30 
                     C150,70 350,-30 600,30 
                     C850,90 1050,-10 1200,30
                     C1350,70 1550,-30 1800,30
                     C2050,90 2250,-10 2400,30
                     L2400,120 L0,120 Z"
                  fill="#c94a00"></path>

            <path d="M0,60 
                     C150,100 350,0 600,60 
                     C850,120 1050,20 1200,60
                     C1350,100 1550,0 1800,60
                     C2050,120 2250,20 2400,60
                     L2400,120 L0,120 Z"
                  fill="#2b2b2b"></path>
        </svg>
    </div>
</div>

<div class="content">
    <a href="sillymillyclicker.html" class="card">
        <img src="sillymillythumbnail.png" class="card-img">
        <div class="card-info">
            <h2>Silly Milly Clicker</h2>
            <p>Click silly milly also just cookie clicker clyyy - UNTESTED</p>
        </div>
    </a>
</div>

<script>
    const cone = document.querySelector(".cone");

    cone.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "auto" });

        const flash = document.createElement("div");
        flash.style.position = "fixed";
        flash.style.top = 0;
        flash.style.left = 0;
        flash.style.width = "100%";
        flash.style.height = "100%";
        flash.style.background = "white";
        flash.style.opacity = "1";
        flash.style.pointerEvents = "none";
        flash.style.transition = "opacity 0.4s ease";
        flash.style.zIndex = "9999";

        document.body.appendChild(flash);

        setTimeout(() => flash.style.opacity = "0", 10);
        setTimeout(() => flash.remove(), 400);
    });
</script>

</body>
</html>
