<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAGE TITLE HERE</title>
<link rel="icon" type="image/png" href="ConeTransp.png">

<style>
    @font-face {
        font-family: 'LemonMilk';
        src: url('LEMONMILK-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
    }

    body {
        margin: 0;
        font-family: 'LemonMilk', sans-serif;
        background: #2b2b2b;
        color: white;
    }

    /* ── TOP BAR ── */
    .top {
        background: #8b2e00;
        height: 220px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        overflow: hidden;
        z-index: 1000;
    }

    .cone {
        position: absolute;
        left: 40px;
        top: 50%;
        transform: translateY(-50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
        cursor: pointer;
    }

    /* Replace YOURLOGO.png with your logo file */
    .logo {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) translateY(-30px);
        height: 80px;
        object-fit: contain;
    }

    .wave-container {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100px;
        overflow: hidden;
    }

    .wave-container svg {
        width: 200%;
        height: 100%;
        animation: waveMove 6s linear infinite;
    }

    @keyframes waveMove {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
    }

    /* ── CONTENT ── */
    .content {
        margin-top: 220px;
        padding: 40px 20px 60px;
    }

    /* ── PUT YOUR PAGE STYLES BELOW THIS LINE ── */


</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="top">
    <img src="ConeTransp.png" class="cone" id="cone">
    <img src="YOURLOGO.png"   class="logo" alt="Logo">

    <div class="wave-container">
        <svg viewBox="0 0 2400 120" preserveAspectRatio="none">
            <path d="M0,30 
                     C150,70 350,-30 600,30 
                     C850,90 1050,-10 1200,30
                     C1350,70 1550,-30 1800,30
                     C2050,90 2250,-10 2400,30
                     L2400,120 L0,120 Z"
                  fill="#c94a00"></path>
            <path d="M0,60 
                     C150,100 350,0 600,60 
                     C850,120 1050,20 1200,60
                     C1350,100 1550,0 1800,60
                     C2050,120 2250,20 2400,60
                     L2400,120 L0,120 Z"
                  fill="#2b2b2b"></path>
        </svg>
    </div>
</div>

<!-- ── YOUR PAGE CONTENT GOES HERE ── -->
<div class="content">

    <!-- content here -->

</div>

<script>
    // ── Cone: flash white and scroll to top ──
    document.getElementById('cone').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'auto' });

        const flash = document.createElement('div');
        flash.style.cssText = `
            position: fixed; inset: 0;
            background: white; opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 9999;
        `;
        document.body.appendChild(flash);
        setTimeout(() => flash.style.opacity = '0', 10);
        setTimeout(() => flash.remove(), 420);
    });

    // ── PUT YOUR PAGE SCRIPTS BELOW THIS LINE ──


</script>
</body>
</html>
